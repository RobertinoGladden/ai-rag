version: "3.9"

services:

  # ── RAG Pipeline Backend ─────────────────────────────────
  rag:
    build:
      context: ./rag_pipeline
      dockerfile: Dockerfile
    container_name: multimodal-rag
    env_file: .env
    volumes:
      - chroma_data:/app/chroma_db
      - mlflow_data:/app/mlruns
      - ./logs/rag:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── CV Module Backend ─────────────────────────────────────
  cv:
    build:
      context: ./cv_module
      dockerfile: Dockerfile
    container_name: multimodal-cv
    env_file: .env
    volumes:
      - model_cache:/app/model_cache
      - mlflow_data:/app/mlruns
      - ./logs/cv:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s    # CV lebih lama karena download model

  # ── MLflow Tracking ───────────────────────────────────────
  mlflow:
    image: python:3.10-slim
    container_name: multimodal-mlflow
    command: >
      sh -c "pip install mlflow -q &&
             mlflow server
             --host 0.0.0.0 --port 5000
             --backend-store-uri /mlruns
             --default-artifact-root /mlruns"
    volumes:
      - mlflow_data:/mlruns
    ports:
      - "5000:5000"
    restart: unless-stopped

  # ── Nginx (Frontend + Reverse Proxy) ─────────────────────
  nginx:
    image: nginx:alpine
    container_name: multimodal-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      rag:
        condition: service_healthy
      cv:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:    # ChromaDB persistent storage
  mlflow_data:    # MLflow experiments shared antara RAG & CV
  model_cache:    # HuggingFace model cache (biar ga re-download)
